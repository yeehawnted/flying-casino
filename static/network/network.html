<!DOCTYPE html>
<html lang = "en">

<head>
	<title>The Flying Casino</title>
</head>

<body>
	<main>
		<input id="roomInput" placeholder ="Room Name" value="global">
		<button id="roomButton">Join Room</button>

		</br>

		<input id="messageInput" placeholder="Message">
		<button id="sendMessage">Send</button>

		<div id="messageBox">
			<p>Messages received:</p>
		</div>

		<input id="directInput" placeholder="Direct Message">
		<input id="directTarget" placeholder="Direct Target">
		<button id="directMessage">Send</button>

		<script type = "module">
			import { constructNetworkAPI } from "./network.js"

			async function init() {
				var network = await constructNetworkAPI("wss://flying-casino-brakftgmdhbca5cy.canadacentral-01.azurewebsites.net/")
				network.onmessage = (message) => {
					const p = document.createElement ("p")
					if (JSON.parse(message.data).direct) {
						p.innerText = "Directly From: " + JSON.parse(message.data).from + "\n" + JSON.parse(message.data).text
						p.style.color = "blue"
					} else {
						p.innerText = "From: " + JSON.parse(message.data).from + "\n" + JSON.parse(message.data).text
					}
					messages.appendChild(p)
				}

				const roomInput = document.getElementById("roomInput")
				const roomButton = document.getElementById("roomButton")

				const input = document.getElementById("messageInput")
				const button = document.getElementById("sendMessage")
				const messages = document.getElementById("messageBox")

				const directInput = document.getElementById("directInput")
				const directTarget = document.getElementById("directTarget")
				const directButton = document.getElementById("directMessage")
				

				roomButton.onclick = async () => {
					// Needed not just because it is good logic, 
					// It is also since otherwise the server might allow one connection two data channels!
					// Funnily, it only happens if you spam it since the server's slow. A local server has no issues. 
					// Likely a smart and more proper fix, but for right now, whatever, right? 
					if (roomInput.value === network.roomId) {return}

					network.destroy()
					network = await constructNetworkAPI(
						"wss://flying-casino-brakftgmdhbca5cy.canadacentral-01.azurewebsites.net/",
						roomInput.value
					)
					const p = document.createElement ("p")
					p.innerText = "Joined room: " + roomInput.value
					p.style.color = "green"
					
					messages.appendChild(p)

					network.onmessage = (message) => {
						const p = document.createElement ("p")
						if (JSON.parse(message.data).direct) {
							p.innerText = "Directly From: " + JSON.parse(message.data).from + "\n" + JSON.parse(message.data).text
							p.style.color = "blue"
						} else {
							p.innerText = "From: " + JSON.parse(message.data).from + "\n" + JSON.parse(message.data).text
						}
						messages.appendChild(p)
					}
				}

				button.onclick = () => {
					network.broadcastObject({
						text: input.value
					})
					input.value = ""
				}

				directButton.onclick = () => {
					try {
						network.sendObject(
							{
								text: directInput.value,
								direct: true
							},
							directTarget.value
						)
					} catch (e) {
						console.log(e)
					}
					directInput.value = ""
				}
			}
			init()
		</script>
	</main>
</body>

</html>
