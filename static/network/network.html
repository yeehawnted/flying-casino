<!DOCTYPE html>
<html lang = "en">

<head>
	<title>The Flying Casino</title>
</head>

<body>
	<main>		
		<input id="messageInput" placeholder="Message">
		<button id="sendMessage">Send</button>

		<div id="messageBox">
			<p>Messages received:</p>
		</div>

		<input id="directInput" placeholder="Direct Message">
		<input id="directTarget" placeholder="Direct Target">
		<button id="directMessage">Send</button>

		<script type = "module">
			import { constructNetworkAPI } from "./network.js"
			async function init() {
				const network = await constructNetworkAPI("wss://flying-casino-brakftgmdhbca5cy.canadacentral-01.azurewebsites.net/")

				const input = document.getElementById("messageInput")
				const button = document.getElementById("sendMessage")
				const messages = document.getElementById("messageBox")

				const directInput = document.getElementById("directInput")
				const directTarget = document.getElementById("directTarget")
				const directButton = document.getElementById("directMessage")
				
				button.onclick = () => {
					network.broadcastObject({
						text: input.value
					})
					input.value = ""
				}

				directButton.onclick = () => {
					try {
						network.sendObject(
							{
								text: directInput.value,
								direct: true
							},
							directTarget.value
						)
					} catch (e) {
						console.log(e)
					}
					directInput.value = ""
				}

				network.onmessage = (message) => {
					const p = document.createElement ("p")
					if (JSON.parse(message.data).direct) {
						p.innerText = "Directly From: " + JSON.parse(message.data).from + "\n" + JSON.parse(message.data).text
						p.style.color = "blue"
					} else {
						p.innerText = "From: " + JSON.parse(message.data).from + "\n" + JSON.parse(message.data).text
					}
					messages.appendChild(p)
				}
			}
			init()
		</script>
	</main>
</body>

</html>
